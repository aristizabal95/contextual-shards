defaults:
  - _self_

environment:
  name: maze
  num_levels: 500
  seed: 0
  distribution_mode: easy

agent:
  name: impala
  checkpoint_path: data/raw/maze_policy.pt
  layer_names:
    - block1
    - block1.res1
    - block1.res2
    - block2
    - block2.res1
    - block2.res2
    - block3
    - block3.res1
    - block3.res2
    - fc

concepts:
  - cheese_presence
  - cheese_proximity
  - cheese_direction
  - corner_proximity

collect:
  n_steps: 100000
  reset_every: 200
  output_path: data/processed/activations_${agent.name}.h5

experiment1:
  probe_type: linear
  n_trials: 5
  context_threshold: 0.5
  causal_n_trials: 100
  near_threshold: 5
  concepts:
    - cheese_presence
    - corner_proximity

experiment2:
  shard_layer: fc

experiment4:
  sae_path: outputs/checkpoints/sae.pt
  target_layer: fc
  top_k_features: 10
  r_threshold: 0.7

experiment5:
  concepts:
    - goal_presence
    - goal_proximity
